# Local development stack: MinIO as the S3-compatible store, a one-shot
# seeder that creates the demo bucket with sample objects, and the proxy.
services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 15

  minio-seed:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb -p local/demo
        printf 'hello from egresszero\n' > /tmp/hello.txt
        mc cp /tmp/hello.txt local/demo/hello.txt
        dd if=/dev/urandom of=/tmp/sample.bin bs=1M count=8
        mc cp /tmp/sample.bin local/demo/sample.bin

  egresszero:
    build: .
    depends_on:
      minio-seed:
        condition: service_completed_successfully
    environment:
      S3_BUCKET: demo
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      CACHE_CONTROL: "public, max-age=300"
      LOG_REQUESTS: "true"
    ports:
      - "8080:8080"
